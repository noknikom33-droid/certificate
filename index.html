<!doctype html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ระบบเกียรติบัตรออนไลน์</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<style>
  :root{
    --ink:#1f2750; --muted:#6b7280; --line:#e7e9f4;
    --brand:#4f46e5; --brand2:#6d5dfb; --brand-soft:#eef0ff;
    --blue:#3b82f6; --pink:#ec4899; --green:#10b981; --orange:#f59e0b;
    --bg:#f5f6fc; --card:#ffffff;
    --shadow:0 18px 40px -22px rgba(40,46,110,.45);
  }
  *{box-sizing:border-box}
  body{font-family:'Sarabun',system-ui,sans-serif;background:var(--bg);color:var(--ink);margin:0}
  a{text-decoration:none}
  .hidden{display:none!important}

  /* ---------- Navbar ---------- */
  .remix-navbar{
    position:sticky;top:0;z-index:50;display:flex;align-items:center;justify-content:space-between;
    gap:16px;padding:12px 26px;background:rgba(255,255,255,.92);backdrop-filter:blur(10px);
    border-bottom:1px solid var(--line)
  }
  .remix-brand{display:flex;align-items:center;gap:12px;color:var(--ink)}
  .remix-logo{width:46px;height:46px;border-radius:14px;display:grid;place-items:center;
    background:linear-gradient(135deg,var(--brand),var(--brand2));color:#fff;font-size:22px;overflow:hidden}
  .remix-logo img{width:100%;height:100%;object-fit:cover}
  .remix-logo .bi{display:none}.remix-logo.logo-fallback .bi{display:block}
  .remix-brand strong{display:block;font-size:1.02rem;line-height:1.1}
  .remix-brand small{color:var(--muted);font-size:.74rem}
  .remix-menu{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
  .remix-menu a{padding:8px 14px;border-radius:10px;color:#444c72;font-weight:600;font-size:.92rem}
  .remix-menu a:hover{background:var(--brand-soft);color:var(--brand)}
  .remix-menu a.login-link{background:linear-gradient(135deg,var(--brand),var(--brand2));color:#fff}

  .remix-page{max-width:1180px;margin:0 auto;padding:24px 20px 60px}

  /* ---------- Banner ---------- */
  .remix-top-banner{position:relative;border-radius:24px;overflow:hidden;min-height:230px;margin-bottom:26px;
    background:linear-gradient(135deg,#3730a3,#6d5dfb 55%,#8b5cf6)}
  .remix-top-banner img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
  .banner-shade{position:absolute;inset:0;background:linear-gradient(120deg,rgba(31,28,90,.82),rgba(60,40,140,.35))}
  .banner-content{position:relative;display:flex;align-items:center;gap:22px;padding:46px 38px;color:#fff}
  .banner-logo{width:84px;height:84px;border-radius:22px;background:rgba(255,255,255,.16);display:grid;place-items:center;
    font-size:40px;overflow:hidden;border:1px solid rgba(255,255,255,.35)}
  .banner-logo img{width:100%;height:100%;object-fit:cover}
  .banner-logo .bi{display:none}.banner-logo.logo-fallback .bi{display:block}
  .banner-content span{letter-spacing:.18em;text-transform:uppercase;font-size:.72rem;opacity:.85;font-weight:700}
  .banner-content h1{font-size:2.1rem;font-weight:800;margin:.15em 0}
  .banner-content p{margin:0;opacity:.9}

  /* ---------- Hero / Search ---------- */
  .remix-hero{display:grid;grid-template-columns:1.6fr 1fr;gap:22px;margin-bottom:24px}
  .remix-hero-left{background:var(--card);border:1px solid var(--line);border-radius:22px;padding:30px;box-shadow:var(--shadow)}
  .remix-kicker{display:inline-flex;align-items:center;gap:8px;background:var(--brand-soft);color:var(--brand);
    font-weight:700;font-size:.82rem;padding:7px 14px;border-radius:999px;margin-bottom:14px}
  .remix-hero-left h1{font-size:1.9rem;font-weight:800;line-height:1.25}
  .remix-hero-left h1 span{color:var(--brand)}
  .remix-hero-left>p{color:var(--muted);margin:10px 0 18px}
  .remix-search{display:flex;align-items:center;gap:10px;background:#f4f5ff;border:1.5px solid #e2e4ff;
    border-radius:16px;padding:8px 8px 8px 16px}
  .remix-search .bi-search{color:var(--brand);font-size:1.1rem}
  .remix-search input{flex:1;border:0;background:transparent;outline:none;font-size:1rem;padding:10px 4px;font-family:inherit}
  .remix-search button{border:0;background:linear-gradient(135deg,var(--brand),var(--brand2));color:#fff;
    font-weight:700;padding:12px 20px;border-radius:12px;display:inline-flex;gap:8px;align-items:center;white-space:nowrap}
  .remix-hero-right{display:grid}
  .remix-logo-card{background:linear-gradient(160deg,#4338ca,#6d5dfb);color:#fff;border-radius:22px;padding:28px;
    text-align:center;display:flex;flex-direction:column;align-items:center;justify-content:center;box-shadow:var(--shadow)}
  .logo-card-img{width:86px;height:86px;border-radius:24px;background:rgba(255,255,255,.18);display:grid;place-items:center;
    font-size:42px;margin-bottom:14px;overflow:hidden}
  .logo-card-img img{width:100%;height:100%;object-fit:cover}
  .logo-card-img .bi{display:none}.logo-card-img.logo-fallback .bi{display:block}
  .remix-logo-card h2{font-size:1.3rem;font-weight:800;margin:0 0 6px}
  .remix-logo-card p{opacity:.9;margin:0;font-size:.95rem}

  /* ---------- Stats ---------- */
  .remix-stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:26px}
  .remix-stat{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:18px 20px;
    display:flex;align-items:center;gap:14px;box-shadow:var(--shadow)}
  .remix-stat .bi{font-size:1.8rem;width:54px;height:54px;border-radius:14px;display:grid;place-items:center;color:#fff}
  .remix-stat.blue .bi{background:var(--blue)} .remix-stat.pink .bi{background:var(--pink)}
  .remix-stat.green .bi{background:var(--green)} .remix-stat.orange .bi{background:var(--orange)}
  .remix-stat strong{font-size:1.7rem;display:block;line-height:1}
  .remix-stat span{color:var(--muted);font-size:.85rem}

  /* ---------- Filter card ---------- */
  .remix-filter-card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:20px 24px;
    margin-bottom:26px;box-shadow:var(--shadow)}
  .filter-title{display:flex;align-items:center;gap:14px;margin-bottom:14px}
  .filter-title span{width:46px;height:46px;border-radius:13px;background:var(--brand-soft);color:var(--brand);
    display:grid;place-items:center;font-size:1.3rem}
  .filter-title strong{display:block} .filter-title small{color:var(--muted)}
  .filter-form{display:flex;gap:12px;flex-wrap:wrap}
  .filter-form .form-select{flex:1;min-width:240px;border-radius:12px;border:1.5px solid var(--line);padding:11px 14px;font-family:inherit}
  .filter-form .btn{border-radius:12px;font-weight:700;padding:11px 22px}

  /* ---------- Sections ---------- */
  .remix-section{background:var(--card);border:1px solid var(--line);border-radius:22px;padding:26px;margin-bottom:26px;box-shadow:var(--shadow)}
  .remix-section-head{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:18px}
  .remix-section-head span{display:inline-block;letter-spacing:.16em;text-transform:uppercase;color:var(--brand);
    font-weight:800;font-size:.72rem}
  .remix-section-head h2{font-size:1.5rem;font-weight:800;margin:.1em 0}
  .remix-count{background:var(--brand-soft);color:var(--brand);border-radius:14px;padding:10px 18px;text-align:center;font-weight:800}
  .remix-count b{font-size:1.4rem;display:block;line-height:1}
  .remix-count small{font-weight:600}

  .remix-table-card{border:1px solid var(--line);border-radius:18px;overflow:hidden}
  .remix-table-top{display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap;
    padding:16px 20px;background:#fafbff;border-bottom:1px solid var(--line)}
  .remix-table-top strong{display:block} .remix-table-top span{color:var(--muted);font-size:.88rem}
  .public-bulk-actions{display:flex;gap:8px;flex-wrap:wrap}
  .public-bulk-actions .btn{border-radius:11px;font-weight:700}
  table.remix-table{margin:0}
  table.remix-table thead th{background:#f3f4ff;color:#3b3f63;font-size:.82rem;text-transform:uppercase;
    letter-spacing:.04em;border:0;padding:14px 16px}
  table.remix-table tbody td{padding:14px 16px;vertical-align:middle;border-color:var(--line)}
  table.remix-table tbody td small{display:block;color:var(--muted);font-size:.8rem}
  .remix-row-no{width:30px;height:30px;border-radius:9px;background:var(--brand-soft);color:var(--brand);
    display:grid;place-items:center;font-weight:800}
  .remix-code{font-family:ui-monospace,monospace;background:#eef2ff;color:#4338ca;padding:5px 10px;border-radius:8px;font-weight:700;font-size:.86rem}
  .remix-owner{display:inline-flex;align-items:center;gap:6px;background:#f0fdf4;color:#15803d;padding:5px 11px;border-radius:999px;font-size:.85rem;font-weight:600}
  .remix-actions{display:flex;gap:6px;justify-content:flex-end;flex-wrap:wrap}
  .remix-actions .btn{border-radius:9px;font-weight:700}

  /* ---------- Activities ---------- */
  .remix-activity-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:18px}
  .remix-activity-card{border:1px solid var(--line);border-radius:18px;overflow:hidden;background:#fff;transition:.2s}
  .remix-activity-card:hover{transform:translateY(-4px);box-shadow:var(--shadow)}
  .activity-image{height:150px;background-size:cover;background-position:center;position:relative;
    background-color:#dfe2f7;background-image:linear-gradient(135deg,#c7d2fe,#a5b4fc)}
  .activity-image span{position:absolute;top:12px;left:12px;background:rgba(16,185,129,.95);color:#fff;
    font-size:.72rem;font-weight:700;padding:4px 10px;border-radius:999px}
  .activity-detail{padding:16px 18px}
  .activity-detail h3{font-size:1.05rem;font-weight:800;margin:0}
  .activity-detail p{color:var(--muted);font-size:.9rem;margin:4px 0 10px}
  .activity-teacher{display:inline-flex;gap:6px;align-items:center;color:#4338ca;font-weight:600;font-size:.86rem;margin-bottom:10px}
  .activity-stats{display:flex;gap:10px}
  .activity-stats span{flex:1;background:#f4f5ff;border-radius:11px;padding:8px;text-align:center;font-size:.82rem;color:var(--muted)}
  .activity-stats b{display:block;color:var(--ink);font-size:1.1rem}

  /* ---------- Footer ---------- */
  .remix-footer{background:#1f2750;color:#cdd2f4;display:flex;align-items:center;justify-content:space-between;
    gap:16px;flex-wrap:wrap;padding:22px 30px;margin-top:10px}
  .remix-footer strong{color:#fff;display:block} .remix-footer span{font-size:.84rem;opacity:.8}
  .remix-footer a{color:#fff;font-weight:700}

  /* ---------- Loading / empty ---------- */
  .loader{text-align:center;padding:60px 20px;color:var(--muted)}
  .spin{width:44px;height:44px;border:4px solid var(--brand-soft);border-top-color:var(--brand);border-radius:50%;
    margin:0 auto 14px;animation:sp 1s linear infinite}
  @keyframes sp{to{transform:rotate(360deg)}}
  .empty-row{text-align:center;color:var(--muted);padding:30px}

  /* ---------- Auth / Admin ---------- */
  .auth-wrap{min-height:calc(100vh - 70px);display:grid;place-items:center;padding:30px 16px;
    background:radial-gradient(1200px 500px at 50% -10%,#e0e3ff,transparent),var(--bg)}
  .auth-card{width:100%;max-width:420px;background:#fff;border:1px solid var(--line);border-radius:22px;
    padding:34px;box-shadow:var(--shadow)}
  .auth-card .logo{width:64px;height:64px;border-radius:18px;background:linear-gradient(135deg,var(--brand),var(--brand2));
    color:#fff;display:grid;place-items:center;font-size:30px;margin:0 auto 16px}
  .auth-card h2{text-align:center;font-weight:800;margin-bottom:4px}
  .auth-card p.sub{text-align:center;color:var(--muted);margin-bottom:22px}
  .form-label{font-weight:600;font-size:.9rem}
  .form-control,.form-select{border-radius:12px;padding:11px 14px;border:1.5px solid var(--line);font-family:inherit}
  .form-control:focus,.form-select:focus{border-color:var(--brand);box-shadow:0 0 0 .2rem rgba(79,70,229,.15)}
  .btn-brand{background:linear-gradient(135deg,var(--brand),var(--brand2));color:#fff;font-weight:700;
    border:0;border-radius:12px;padding:12px}
  .btn-brand:hover{filter:brightness(1.05);color:#fff}

  .admin-shell{display:grid;grid-template-columns:240px 1fr;min-height:calc(100vh - 70px)}
  .admin-side{background:#1f2750;color:#cfd3f5;padding:22px 16px;position:sticky;top:70px;align-self:start;height:calc(100vh - 70px)}
  .admin-side .who{background:rgba(255,255,255,.08);border-radius:14px;padding:14px;margin-bottom:18px}
  .admin-side .who strong{color:#fff;display:block}
  .admin-side .who span{font-size:.8rem;opacity:.8}
  .admin-nav{display:flex;flex-direction:column;gap:6px}
  .admin-nav button{display:flex;align-items:center;gap:10px;background:transparent;border:0;color:#cfd3f5;
    text-align:left;padding:11px 14px;border-radius:11px;font-weight:600;font-family:inherit;width:100%}
  .admin-nav button:hover{background:rgba(255,255,255,.08);color:#fff}
  .admin-nav button.active{background:linear-gradient(135deg,var(--brand),var(--brand2));color:#fff}
  .admin-main{padding:28px}
  .admin-head{display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap;margin-bottom:22px}
  .admin-head h1{font-weight:800;font-size:1.5rem;margin:0}
  .admin-card{background:#fff;border:1px solid var(--line);border-radius:18px;padding:22px;box-shadow:var(--shadow);margin-bottom:22px}

  /* ---------- Certificate render ---------- */
  .cert-toolbar{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;
    max-width:1080px;margin:24px auto 10px;padding:0 16px}
  .cert-toolbar .btn{border-radius:11px;font-weight:700}
  .cert-stage{max-width:1080px;margin:0 auto 50px;padding:0 16px}
  .certificate{position:relative;aspect-ratio:1.414/1;background:#fff;border-radius:8px;overflow:hidden;
    box-shadow:0 30px 60px -30px rgba(31,39,80,.6);background-size:cover;background-position:center}
  .cert-frame{position:absolute;inset:18px;border:3px solid #c9a44a;border-radius:6px;pointer-events:none}
  .cert-frame::after{content:"";position:absolute;inset:8px;border:1px solid #d9bd77;border-radius:4px}
  .cert-body{position:relative;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;padding:7% 9%;color:#2b2f55}
  .cert-emblem{width:74px;height:74px;border-radius:50%;background:linear-gradient(135deg,#caa44a,#e9cf86);
    color:#fff;display:grid;place-items:center;font-size:34px;margin-bottom:10px;box-shadow:0 8px 20px -8px rgba(180,140,40,.7)}
  .cert-kicker{letter-spacing:.32em;text-transform:uppercase;color:#b08a2d;font-weight:700;font-size:clamp(.6rem,1.4vw,.8rem)}
  .cert-title{font-size:clamp(1.6rem,4.6vw,3rem);font-weight:900;color:#2b2f55;margin:.1em 0 .25em;letter-spacing:.02em}
  .cert-said{color:#555;font-size:clamp(.8rem,1.8vw,1.05rem)}
  .cert-name{font-size:clamp(1.4rem,4vw,2.6rem);font-weight:800;color:#3b2f8c;margin:.25em 0;
    border-bottom:2px dashed #c9a44a;padding:0 .4em .12em;display:inline-block}
  .cert-course{font-size:clamp(.95rem,2.2vw,1.35rem);font-weight:600;max-width:80%;margin:.3em auto}
  .cert-org{color:#555;font-size:clamp(.8rem,1.7vw,1rem);margin-top:.2em}
  .cert-foot{display:flex;align-items:flex-end;justify-content:space-between;width:100%;margin-top:auto;padding-top:5%}
  .cert-foot .col{flex:1;text-align:center;font-size:clamp(.7rem,1.5vw,.95rem);color:#444}
  .cert-foot .sign-line{border-top:1.5px solid #6b6f93;margin:0 18% 6px;padding-top:6px}
  .cert-code{position:absolute;bottom:26px;left:50%;transform:translateX(-50%);font-family:ui-monospace,monospace;
    font-size:clamp(.65rem,1.4vw,.85rem);color:#7a7f9c;background:rgba(255,255,255,.7);padding:3px 12px;border-radius:999px}

  /* bulk */
  .bulk-page{max-width:1080px;margin:0 auto;padding:24px 16px}
  .bulk-page .certificate{margin-bottom:30px}

  @media (max-width:900px){
    .remix-hero{grid-template-columns:1fr}
    .remix-stat-grid{grid-template-columns:repeat(2,1fr)}
    .admin-shell{grid-template-columns:1fr}
    .admin-side{position:static;height:auto}
    .banner-content h1{font-size:1.5rem}
  }
  @media print{
    .no-print{display:none!important}
    body{background:#fff}
    .cert-stage,.bulk-page{max-width:none;margin:0;padding:0}
    .certificate{box-shadow:none;border-radius:0;page-break-after:always;width:100%;height:100vh;aspect-ratio:auto}
    @page{size:A4 landscape;margin:0}
  }
</style>
</head>
<body>

<!-- ============ NAVBAR ============ -->
<nav class="remix-navbar no-print" id="topnav">
  <a class="remix-brand" href="#/">
    <span class="remix-logo logo-fallback"><i class="bi bi-award-fill"></i></span>
    <span><strong>ระบบเกียรติบัตรออนไลน์</strong><small>Public Certificate Portal</small></span>
  </a>
  <div class="remix-menu" id="navMenu">
    <a href="#/">หน้าแรก</a>
    <a href="#/#certificateTable">ตารางเกียรติบัตร</a>
    <a href="#/#activities">กิจกรรม</a>
    <a href="#/login" class="login-link"><i class="bi bi-box-arrow-in-right"></i> เข้าสู่ระบบ</a>
  </div>
</nav>

<!-- ============ APP ROOT ============ -->
<div id="app"></div>

<footer class="remix-footer no-print">
  <div><strong>ระบบเกียรติบัตรออนไลน์</strong><span>Public Certificate Portal</span></div>
  <a href="#/login">เข้าสู่ระบบผู้ดูแล <i class="bi bi-arrow-right"></i></a>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
/* ============================================================
   ตั้งค่า API  (เปลี่ยนเป็นลิงก์ /exec ของคุณหากมีการ deploy ใหม่)
   ============================================================ */
const API_URL = 'https://script.google.com/macros/s/AKfycbySKYbN6_ZEHJl7L-LWogusU9L5VEJXouBflLOW3veMekapyI9gWQMyEUvAGwFAEyhY8Q/exec';

/* ---------- ตัวช่วยเรียก API ---------- */
async function apiGet(action, params = {}){
  const qs = new URLSearchParams({ action, ...params }).toString();
  const res = await fetch(API_URL + '?' + qs);
  return res.json();
}
async function apiPost(action, data = {}){
  const res = await fetch(API_URL, {
    method:'POST',
    headers:{'Content-Type':'text/plain;charset=utf-8'}, // เลี่ยง CORS preflight
    body: JSON.stringify({ action, ...data })
  });
  return res.json();
}

/* ---------- จัดเก็บ session ---------- */
const Session = {
  get(){ try{ return JSON.parse(localStorage.getItem('cert_user')||'null'); }catch(e){ return null; } },
  set(u){ localStorage.setItem('cert_user', JSON.stringify(u)); },
  clear(){ localStorage.removeItem('cert_user'); }
};

/* ---------- helper ---------- */
const THMONTHS = ['','มกราคม','กุมภาพันธ์','มีนาคม','เมษายน','พฤษภาคม','มิถุนายน','กรกฎาคม','สิงหาคม','กันยายน','ตุลาคม','พฤศจิกายน','ธันวาคม'];
function thaiDate(s){
  if(!s) return '';
  const m = String(s).match(/(\d{4})-(\d{1,2})-(\d{1,2})/);
  if(!m) return s;
  let y = parseInt(m[1],10); if(y < 2500) y += 543; // เผื่อเก็บเป็น ค.ศ.
  return parseInt(m[3],10) + ' ' + THMONTHS[parseInt(m[2],10)] + ' ' + y;
}
function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function el(id){ return document.getElementById(id); }
function toast(msg, ok=true){
  const t = document.createElement('div');
  t.style.cssText = 'position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:9999;'+
    'background:'+(ok?'#10b981':'#ef4444')+';color:#fff;padding:12px 22px;border-radius:12px;'+
    'font-weight:600;box-shadow:0 10px 30px -10px rgba(0,0,0,.4)';
  t.textContent = msg; document.body.appendChild(t);
  setTimeout(()=>{ t.style.transition='.4s'; t.style.opacity='0'; setTimeout(()=>t.remove(),400); }, 2200);
}

/* ============================================================
   ROUTER
   ============================================================ */
window.addEventListener('hashchange', router);
window.addEventListener('load', router);

function router(){
  const hash = location.hash.replace(/^#/,'') || '/';
  const [path, anchor] = hash.split('#'); // เผื่อ #/#activities
  const parts = path.split('/').filter(Boolean);

  el('topnav').classList.remove('hidden');
  document.querySelector('.remix-footer').classList.remove('hidden');

  if(parts[0] === 'cert'){           renderCertificate(parts[1]); return; }
  if(parts[0] === 'bulk'){           renderBulk(); return; }
  if(parts[0] === 'login'){          renderLogin(); return; }
  if(parts[0] === 'admin'){          renderAdmin(parts[1]||'dashboard'); return; }
  renderHome(anchor);
}

async function doLogin(){
  const username = el('loginUser').value.trim();
  const password = el('loginPass').value;
  if(!username || !password){ toast('กรอกชื่อผู้ใช้และรหัสผ่าน', false); return; }
  const btn = el('loginBtn'); btn.disabled = true; btn.textContent = 'กำลังตรวจสอบ...';
  const res = await apiPost('login', { username, password });
  btn.disabled = false; btn.textContent = 'เข้าสู่ระบบ';
  if(res && res.ok){ Session.set(res.user); toast('ยินดีต้อนรับ '+res.user.name); location.hash = '/admin'; }
  else { toast(res && res.error || 'เข้าสู่ระบบไม่สำเร็จ', false); }
}

function openActivity(a){
  const m = bootstrap.Modal.getOrCreateInstance(el('activityModal')); m.show();
  setTimeout(()=>{
    el('aId').value = a?a.id:'';
    el('aTitle').value = a?a.title:'เกียรติบัตร';
    el('aCourse').value = a?a.course:'';
    el('aPrefix').value = a?a.prefix:'กต';
    el('aStatus').value = a?a.status:'active';
    el('aBg').value = a?a.background:'';
    el('activityModalLabel').textContent = a?'แก้ไขกิจกรรม':'เพิ่มกิจกรรม';
  },150);
}
async function saveActivityForm(){
  const u = Session.get();
  const res = await apiPost('saveActivity', {
    token:u.token, id:el('aId').value,
    title:el('aTitle').value, course:el('aCourse').value,
    prefix:el('aPrefix').value, status:el('aStatus').value, background:el('aBg').value
  });
  if(res && res.ok){ bootstrap.Modal.getInstance(el('activityModal')).hide(); toast('บันทึกกิจกรรมแล้ว'); renderAdmin('activities'); }
  else toast(res && res.error || 'บันทึกไม่สำเร็จ', false);
}
async function delActivity(id){
  if(!confirm('ยืนยันลบกิจกรรมนี้?')) return;
  const u = Session.get();
  const res = await apiPost('deleteActivity', { token:u.token, id });
  if(res && res.ok){ toast('ลบแล้ว'); renderAdmin('activities'); } else toast(res.error||'ลบไม่สำเร็จ', false);
}

/* ---------- จัดการเกียรติบัตร ---------- */
function adminCertificates(){
  const d = ADMIN.data;
  const actMap = {}; d.activities.forEach(a=>actMap[String(a.id)]=a);
  const rows = d.certificates.length ? d.certificates.map(c=>{
    const a = actMap[String(c.activity_id)]||{};
    return `<tr>
      <td><span class="remix-code">${esc(c.code)}</span></td>
      <td><strong>${esc(c.name)}</strong><small>${esc(c.organization)}</small></td>
      <td>${esc(a.course||'')}</td>
      <td>${esc(thaiDate(c.issue_date))}</td>
      <td class="text-end remix-actions">
        <a class="btn btn-sm btn-primary" href="#/cert/${c.id}" target="_blank"><i class="bi bi-eye"></i></a>
        <button class="btn btn-sm btn-light" onclick='openCert(${JSON.stringify(c)})'><i class="bi bi-pencil"></i></button>
        <button class="btn btn-sm btn-outline-danger" onclick="delCert('${c.id}')"><i class="bi bi-trash"></i></button>
      </td>
    </tr>`;
  }).join('') : `<tr><td colspan="5" class="empty-row">ยังไม่มีเกียรติบัตร</td></tr>`;

  el('adminMain').innerHTML = `
    <div class="admin-head">
      <h1>เกียรติบัตร</h1>
      <button class="btn btn-brand" onclick="openCert()" ${d.activities.length?'':'disabled'}><i class="bi bi-plus-lg"></i> ออกเกียรติบัตร</button>
    </div>
    ${d.activities.length?'':'<div class="admin-card text-muted">กรุณาเพิ่มกิจกรรมก่อนออกเกียรติบัตร</div>'}
    <div class="admin-card p-0">
      <div class="table-responsive">
        <table class="table remix-table align-middle mb-0">
          <thead><tr><th>เลขที่</th><th>ผู้รับ</th><th>หลักสูตร</th><th>วันที่ออก</th><th class="text-end">จัดการ</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    </div>
    ${modalShell('certModal','เกียรติบัตร', certForm())}`;
}
function certForm(){
  const d = ADMIN.data;
  const opts = d.activities.map(a=>`<option value="${a.id}">${esc(a.title)} - ${esc(a.course)} (${esc(a.prefix)})</option>`).join('');
  return `
    <input type="hidden" id="cId"><input type="hidden" id="cCode">
    <div class="mb-3"><label class="form-label">ชื่อ-นามสกุล ผู้รับ</label><input id="cName" class="form-control" placeholder="เช่น นายสมชาย ใจดี"></div>
    <div class="mb-3"><label class="form-label">หน่วยงาน/โรงเรียน</label><input id="cOrg" class="form-control" value="${esc((d.me.organization)||'')}"></div>
    <div class="mb-3"><label class="form-label">กิจกรรม</label><select id="cAct" class="form-select">${opts}</select></div>
    <div class="mb-3"><label class="form-label">วันที่ออก (พ.ศ.)</label><input id="cDate" type="text" class="form-control" placeholder="2569-06-21"></div>`;
}
function openCert(c){
  const m = bootstrap.Modal.getOrCreateInstance(el('certModal')); m.show();
  setTimeout(()=>{
    el('cId').value = c?c.id:''; el('cCode').value = c?c.code:'';
    el('cName').value = c?c.name:''; el('cOrg').value = c?c.organization:(ADMIN.data.me.organization||'');
    if(c) el('cAct').value = c.activity_id;
    el('cDate').value = c?String(c.issue_date).slice(0,10):todayThaiInput();
    el('certModalLabel').textContent = c?'แก้ไขเกียรติบัตร':'ออกเกียรติบัตร';
  },150);
}
function todayThaiInput(){
  const d=new Date(); const y=d.getFullYear()+543;
  return y+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
async function saveCertForm(){
  const u = Session.get();
  if(!el('cName').value.trim()){ toast('กรอกชื่อผู้รับ', false); return; }
  const res = await apiPost('saveCertificate', {
    token:u.token, id:el('cId').value, code:el('cCode').value,
    name:el('cName').value, organization:el('cOrg').value,
    activity_id:el('cAct').value, issue_date:el('cDate').value
  });
  if(res && res.ok){ bootstrap.Modal.getInstance(el('certModal')).hide(); toast('บันทึกเกียรติบัตร '+(res.code||'')); renderAdmin('certificates'); }
  else toast(res && res.error || 'บันทึกไม่สำเร็จ', false);
}
async function delCert(id){
  if(!confirm('ยืนยันลบเกียรติบัตรนี้?')) return;
  const u = Session.get();
  const res = await apiPost('deleteCertificate', { token:u.token, id });
  if(res && res.ok){ toast('ลบแล้ว'); renderAdmin('certificates'); } else toast(res.error||'ลบไม่สำเร็จ', false);
}

/* ---------- จัดการผู้ใช้งาน ---------- */
function adminUsers(){
  const d = ADMIN.data;
  const rows = d.users.map(u=>`
    <tr>
      <td><strong>${esc(u.name)}</strong><small>@${esc(u.username)}</small></td>
      <td>${esc(u.organization)}</td>
      <td>${u.role==='admin'?'<span class="remix-owner">ผู้ดูแลระบบ</span>':'ครู'}</td>
      <td class="text-end remix-actions">
        <button class="btn btn-sm btn-light" onclick='openUser(${JSON.stringify(u)})'><i class="bi bi-pencil"></i></button>
        <button class="btn btn-sm btn-outline-danger" onclick="delUser('${u.id}')"><i class="bi bi-trash"></i></button>
      </td>
    </tr>`).join('');
  el('adminMain').innerHTML = `
    <div class="admin-head">
      <h1>ผู้ใช้งาน</h1>
      <button class="btn btn-brand" onclick="openUser()"><i class="bi bi-plus-lg"></i> เพิ่มผู้ใช้</button>
    </div>
    <div class="admin-card p-0">
      <div class="table-responsive">
        <table class="table remix-table align-middle mb-0">
          <thead><tr><th>ชื่อ</th><th>หน่วยงาน</th><th>สิทธิ์</th><th class="text-end">จัดการ</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    </div>
    ${modalShell('userModal','ผู้ใช้งาน', userForm())}`;
}
function userForm(){
  return `
    <input type="hidden" id="uId">
    <div class="mb-3"><label class="form-label">ชื่อ-นามสกุล</label><input id="uName" class="form-control"></div>
    <div class="row">
      <div class="col-6 mb-3"><label class="form-label">ชื่อผู้ใช้ (username)</label><input id="uUsername" class="form-control"></div>
      <div class="col-6 mb-3"><label class="form-label">รหัสผ่าน</label><input id="uPass" class="form-control" placeholder="เว้นว่าง = คงรหัสเดิม"></div>
    </div>
    <div class="mb-3"><label class="form-label">หน่วยงาน</label><input id="uOrg" class="form-control"></div>
    <div class="mb-3"><label class="form-label">สิทธิ์</label><select id="uRole" class="form-select"><option value="teacher">ครู</option><option value="admin">ผู้ดูแลระบบ</option></select></div>`;
}
function openUser(u){
  const m = bootstrap.Modal.getOrCreateInstance(el('userModal')); m.show();
  setTimeout(()=>{
    el('uId').value = u?u.id:''; el('uName').value = u?u.name:'';
    el('uUsername').value = u?u.username:''; el('uPass').value='';
    el('uOrg').value = u?u.organization:''; el('uRole').value = u?u.role:'teacher';
    el('userModalLabel').textContent = u?'แก้ไขผู้ใช้':'เพิ่มผู้ใช้';
  },150);
}
async function saveUserForm(){
  const u = Session.get();
  const res = await apiPost('saveUser', {
    token:u.token, id:el('uId').value, name:el('uName').value,
    username:el('uUsername').value, password:el('uPass').value,
    organization:el('uOrg').value, role:el('uRole').value
  });
  if(res && res.ok){ bootstrap.Modal.getInstance(el('userModal')).hide(); toast('บันทึกผู้ใช้แล้ว'); renderAdmin('users'); }
  else toast(res && res.error || 'บันทึกไม่สำเร็จ', false);
}
async function delUser(id){
  if(!confirm('ยืนยันลบผู้ใช้นี้?')) return;
  const u = Session.get();
  const res = await apiPost('deleteUser', { token:u.token, id });
  if(res && res.ok){ toast('ลบแล้ว'); renderAdmin('users'); } else toast(res.error||'ลบไม่สำเร็จ', false);
}

/* ---------- modal + ปุ่มบันทึกตามชนิด ---------- */
function modalShell(idName, title, formHtml){
  const saveFn = {activityModal:'saveActivityForm()', certModal:'saveCertForm()', userModal:'saveUserForm()'}[idName];
  return `
  <div class="modal fade" id="${idName}" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content" style="border-radius:18px;border:0">
        <div class="modal-header"><h5 class="modal-title fw-bold" id="${idName}Label">${title}</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
        <div class="modal-body">${formHtml}</div>
        <div class="modal-footer">
          <button class="btn btn-light" data-bs-dismiss="modal">ยกเลิก</button>
          <button class="btn btn-brand px-4" onclick="${saveFn}">บันทึก</button>
        </div>
      </div>
    </div>
  </div>`;
}

/* ---------- กล่อง error ---------- */
function errorBox(msg){
  return `<div class="remix-page"><div class="admin-card text-center" style="max-width:560px;margin:40px auto">
    <i class="bi bi-exclamation-triangle text-warning" style="font-size:2.4rem"></i>
    <h4 class="fw-bold mt-2">เกิดข้อผิดพลาด</h4>
    <p class="text-muted">${esc(msg)}</p>
    <p class="text-muted small">หากเพิ่ง deploy API ใหม่ ตรวจสอบว่าตั้งค่า <b>Who has access = Anyone</b> และคัดลอกลิงก์ /exec ถูกต้องในตัวแปร API_URL</p>
    <a href="#/" class="btn btn-primary">กลับหน้าแรก</a>
  </div></div>`;
}
</script>
</body>
