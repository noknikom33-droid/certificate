<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ระบบเกียรติบัตรออนไลน์</title>
  <meta name="description" content="ระบบเกียรติบัตรออนไลน์ ค้นหา ตรวจสอบ และพิมพ์เกียรติบัตร">

  <!-- ===== Fonts ===== -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800;900&family=Prompt:wght@500;600;700;800&display=swap" rel="stylesheet">

  <!-- ===== Bootstrap + Icons (CDN) ===== -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

  <!-- ===== สไตล์ของระบบ ===== -->
  <link href="assets/css/style.css" rel="stylesheet">
</head>
<body>

  <!-- ทุกหน้าถูกสร้างในกล่องนี้โดย JavaScript -->
  <div id="root">
    <div class="loader"><div class="spin"></div>กำลังเริ่มต้นระบบ...</div>
  </div>

  <!-- ตัวช่วยแจ้งเตือนเมื่อโหลดไฟล์ไม่สำเร็จ (ต้องอยู่ก่อนสคริปต์อื่น) -->
  <script>
    window.__bootDiag = function(msg){
      var r=document.getElementById('root');
      if(r) r.innerHTML='<div style="max-width:560px;margin:50px auto;background:#fff;border:1px solid #eee;border-radius:16px;padding:26px;text-align:center;font-family:Sarabun,sans-serif">'
        +'<div style="font-size:2.2rem">⚠️</div><h3 style="font-weight:800">โหลดระบบไม่สำเร็จ</h3>'
        +'<p style="color:#666">'+msg+'</p>'
        +'<p style="color:#999;font-size:.85rem">ตรวจว่าโครงสร้างไฟล์บน GitHub เป็น<br><b>index.html</b> และโฟลเดอร์ <b>assets/css/style.css</b>, <b>assets/js/config.js</b>, <b>assets/js/app.js</b><br>(ชื่อโฟลเดอร์/ไฟล์ต้องตรงตัวพิมพ์เล็ก-ใหญ่)</p></div>';
    };
    // ถ้าผ่านไป 2 วินาทีแล้วระบบยังไม่เริ่ม แปลว่าสคริปต์ไม่ถูกรัน (มักเป็นที่ path ไฟล์)
    window.__bootTimer = setTimeout(function(){
      if(!window.__booted) window.__bootDiag('สคริปต์ assets/js/app.js ไม่ถูกเรียกใช้งาน — มักเกิดจากวางไฟล์ผิดโฟลเดอร์ หรือชื่อโฟลเดอร์ไม่ตรง');
    }, 2000);
  </script>

  <!-- ===== โหลดไฟล์ในเครื่องก่อน (เร็ว ไม่บล็อก) ===== -->
  <script src="assets/js/config.js" onerror="window.__bootDiag('โหลด assets/js/config.js ไม่สำเร็จ (ไฟล์อยู่ผิดที่หรือชื่อไม่ตรง)')"></script>
  <script src="assets/js/app.js" onerror="window.__bootDiag('โหลด assets/js/app.js ไม่สำเร็จ (ไฟล์อยู่ผิดที่หรือชื่อไม่ตรง)')"></script>

  <!-- ===== ไลบรารีภายนอกโหลดทีหลังแบบไม่บล็อก (ใช้ตอนทำกราฟ/ป็อปอัป) ===== -->
  <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</body>
</html>
