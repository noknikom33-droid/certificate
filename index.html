<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ระบบเกียรติบัตรออนไลน์</title>
  <meta name="description" content="ระบบเกียรติบัตรออนไลน์ ค้นหา ตรวจสอบ และพิมพ์เกียรติบัตร">

  <!-- ===== Fonts ===== -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800;900&family=Prompt:wght@500;600;700;800&display=swap" rel="stylesheet">

  <!-- ===== Bootstrap + Icons (CDN) ===== -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

  <!-- ===== สไตล์ของระบบ (ไฟล์อยู่ระดับเดียวกับ index.html) ===== -->
  <link href="style.css" rel="stylesheet">
</head>
<body>

  <!-- ทุกหน้าถูกสร้างในกล่องนี้โดย JavaScript -->
  <div id="root">
    <div class="loader"><div class="spin"></div>กำลังเริ่มต้นระบบ...</div>
  </div>

  <!-- ตัวช่วยแจ้งเตือนเมื่อโหลดไฟล์ไม่สำเร็จ -->
  <script>
    window.__bootDiag = function(msg){
      var r=document.getElementById('root');
      if(r) r.innerHTML='<div style="max-width:560px;margin:50px auto;background:#fff;border:1px solid #eee;border-radius:16px;padding:26px;text-align:center;font-family:Sarabun,sans-serif">'
        +'<div style="font-size:2.2rem">⚠️</div><h3 style="font-weight:800">โหลดระบบไม่สำเร็จ</h3>'
        +'<p style="color:#666">'+msg+'</p>'
        +'<p style="color:#999;font-size:.85rem">ต้องมีไฟล์ <b>index.html, style.css, config.js, app.js</b> วางอยู่ระดับเดียวกัน</p></div>';
    };
    window.__bootTimer = setTimeout(function(){
      if(!window.__booted) window.__bootDiag('สคริปต์ app.js ไม่ถูกเรียกใช้งาน — ตรวจว่าไฟล์ app.js อยู่ระดับเดียวกับ index.html');
    }, 2000);
  </script>

  <!-- ===== โหลดไฟล์ในเครื่องก่อน (เร็ว ไม่บล็อก) ===== -->
  <script src="config.js" onerror="window.__bootDiag('โหลด config.js ไม่สำเร็จ')"></script>
  <script src="app.js" onerror="window.__bootDiag('โหลด app.js ไม่สำเร็จ')"></script>

  <!-- ===== ไลบรารีภายนอกโหลดทีหลังแบบไม่บล็อก ===== -->
  <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</body>
</html>
